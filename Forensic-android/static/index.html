<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Android Forensic Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-body: #0d1117;
  --bg-sidebar: #161b22;
  --bg-card: #21262d;
  --bg-card-hover: #30363d;
  --bg-card-active: #1f2a3a;
  --bg-tab: #161b22;
  --bg-table-header: #21262d;
  --bg-table-row: #0d1117;
  --bg-table-row-alt: #161b22;
  --bg-input: #21262d;
  --border: #30363d;
  --border-focus: #00e676;
  --text-primary: #c9d1d9;
  --text-secondary: #8b949e;
  --text-muted: #6e7681;
  --accent: #00e676;
  --accent-hover: #00c853;
  --accent-dim: rgba(0, 230, 118, 0.12);
  --danger: #f85149;
  --warning: #d29922;
  --scrollbar-thumb: #30363d;
  --scrollbar-track: #161b22;
  --radius: 8px;
  --radius-sm: 4px;
  --transition: 0.2s ease;
  --sidebar-w: 300px;
  --header-h: 56px;
}
html { font-size: 14px; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-body);
  color: var(--text-primary);
  min-height: 100vh;
  overflow: hidden;
}
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--scrollbar-track); }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
::selection { background: var(--accent-dim); color: var(--accent); }
a { color: var(--accent); text-decoration: none; }

/* ── Header ─────────────────────────────────────────────────── */
header {
  height: var(--header-h);
  background: var(--bg-sidebar);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
}
header h1 {
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 0.3px;
  display: flex;
  align-items: center;
  gap: 8px;
}
header h1::before {
  content: '';
  display: inline-block;
  width: 10px; height: 10px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.header-actions { display: flex; align-items: center; gap: 8px; }
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 16px;
  border: none;
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: background var(--transition), opacity var(--transition);
}
.btn-primary {
  background: var(--accent);
  color: #0d1117;
}
.btn-primary:hover { background: var(--accent-hover); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-secondary {
  background: var(--bg-card);
  color: var(--text-primary);
  border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--bg-card-hover); }
.btn-icon {
  padding: 6px 10px;
  background: var(--bg-card);
  color: var(--text-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 1rem;
  transition: background var(--transition), color var(--transition);
}
.btn-icon:hover { background: var(--bg-card-hover); color: var(--text-primary); }

/* ── Layout ─────────────────────────────────────────────────── */
.main-container {
  display: flex;
  margin-top: var(--header-h);
  height: calc(100vh - var(--header-h));
}

/* ── Sidebar ────────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width var(--transition), min-width var(--transition);
}
.sidebar-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sidebar-header h2 {
  font-size: 0.8rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-secondary);
}
.sidebar-header .count {
  font-size: 0.75rem;
  color: var(--text-muted);
  background: var(--bg-card);
  padding: 2px 8px;
  border-radius: 99px;
}
#device-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.device-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-left: 3px solid transparent;
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: all var(--transition);
}
.device-card:hover {
  background: var(--bg-card-hover);
  border-color: var(--text-muted);
}
.device-card.active {
  background: var(--bg-card-active);
  border-left-color: var(--accent);
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent-dim);
}
.device-model {
  font-weight: 600;
  font-size: 0.9rem;
  color: var(--text-primary);
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.device-serial {
  font-size: 0.75rem;
  color: var(--text-muted);
  font-family: 'SFMono-Regular', Consolas, monospace;
  margin-bottom: 4px;
}
.device-status {
  display: inline-block;
  font-size: 0.7rem;
  font-weight: 500;
  padding: 1px 8px;
  border-radius: 99px;
  text-transform: capitalize;
}
.device-status.device { background: rgba(0,230,118,0.15); color: var(--accent); }
.device-status.offline { background: rgba(248,81,73,0.15); color: var(--danger); }
.device-status.unauthorized { background: rgba(210,153,34,0.15); color: var(--warning); }
.device-status.recovery { background: rgba(88,166,255,0.15); color: #58a6ff; }
.device-status.bootloader { background: rgba(139,148,158,0.15); color: var(--text-secondary); }
.sidebar-loading, .sidebar-empty {
  padding: 24px 16px;
  text-align: center;
  color: var(--text-muted);
  font-size: 0.85rem;
}
.spinner {
  display: inline-block;
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Content ────────────────────────────────────────────────── */
.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}
.content-placeholder {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  gap: 12px;
  padding: 40px;
}
.data-views {
  position: relative;
  display: none;
  flex-direction: column;
  height: 100%;
}
.loading-overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(13,17,23,0.75);
  z-index: 50;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  color: var(--text-primary);
}
.loading-overlay.show {
  display: flex;
}
.content-placeholder .icon {
  font-size: 3rem;
  opacity: 0.3;
}
.content-placeholder p { font-size: 0.95rem; }
.content-placeholder .hint { font-size: 0.8rem; color: var(--text-muted); }

/* ── Tab Bar ────────────────────────────────────────────────── */
.tab-bar {
  display: flex;
  background: var(--bg-tab);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  flex-shrink: 0;
}
.tab-btn {
  padding: 10px 18px;
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text-secondary);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  white-space: nowrap;
  transition: color var(--transition), border-color var(--transition);
  font-family: inherit;
}
.tab-btn:hover { color: var(--text-primary); }
.tab-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}
.tab-btn .tab-count {
  margin-left: 4px;
  font-size: 0.7rem;
  color: var(--text-muted);
}

/* ── Toolbar (search + stats) ───────────────────────────────── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  flex-shrink: 0;
}
.search-wrap {
  position: relative;
  flex: 1;
  min-width: 160px;
  max-width: 360px;
}
.search-wrap input {
  width: 100%;
  padding: 7px 12px 7px 32px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: inherit;
  font-size: 0.82rem;
  outline: none;
  transition: border-color var(--transition);
}
.search-wrap input:focus { border-color: var(--border-focus); }
.search-wrap input::placeholder { color: var(--text-muted); }
.search-wrap .search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 0.85rem;
  pointer-events: none;
}
.stats-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
  margin-left: auto;
}
.stat-badge {
  font-size: 0.72rem;
  color: var(--text-secondary);
  background: var(--bg-card);
  padding: 3px 10px;
  border-radius: 99px;
  white-space: nowrap;
  border: 1px solid var(--border);
}
.stat-badge strong {
  color: var(--accent);
  font-weight: 600;
}

/* ── Tab Content ────────────────────────────────────────────── */
.tab-panels {
  flex: 1;
  overflow: hidden;
  position: relative;
}
.tab-panel {
  display: none;
  height: 100%;
  overflow-y: auto;
  padding: 0;
  opacity: 0;
  transition: opacity 0.15s ease;
}
.tab-panel.active {
  display: block;
  opacity: 1;
}

/* ── Tables ─────────────────────────────────────────────────── */
.table-wrap {
  overflow-x: auto;
}
table {
  width: 100%;
  border-collapse: collapse;
}
table th {
  background: var(--bg-table-header);
  color: var(--text-secondary);
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 8px 12px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 1;
}
table td {
  padding: 7px 12px;
  font-size: 0.82rem;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  word-break: break-word;
}
table tr:nth-child(odd) td { background: var(--bg-table-row-alt); }
table tr:nth-child(even) td { background: var(--bg-table-row); }
table tr:hover td { background: var(--bg-card-hover); }
.sms-body {
  max-width: 320px;
  white-space: pre-wrap;
  font-size: 0.78rem;
  color: var(--text-secondary);
}
.badge-type {
  display: inline-block;
  font-size: 0.65rem;
  font-weight: 600;
  padding: 1px 7px;
  border-radius: 99px;
  text-transform: uppercase;
}
.badge-inbox { background: rgba(0,230,118,0.15); color: var(--accent); }
.badge-sent { background: rgba(88,166,255,0.15); color: #58a6ff; }
.badge-draft { background: rgba(139,148,158,0.15); color: var(--text-secondary); }
.badge-outbox { background: rgba(210,153,34,0.15); color: var(--warning); }
.badge-incoming { background: rgba(0,230,118,0.15); color: var(--accent); }
.badge-outgoing { background: rgba(88,166,255,0.15); color: #58a6ff; }
.badge-missed { background: rgba(248,81,73,0.15); color: var(--danger); }
.badge-voicemail { background: rgba(210,153,34,0.15); color: var(--warning); }
.badge-rejected { background: rgba(139,148,158,0.15); color: var(--text-secondary); }

/* ── Apps Grid ──────────────────────────────────────────────── */
.apps-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 8px;
  padding: 12px 16px;
}
.app-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  transition: border-color var(--transition);
}
.app-card:hover {
  border-color: var(--accent);
}
.app-card .pkg-name {
  font-size: 0.75rem;
  font-family: 'SFMono-Regular', Consolas, monospace;
  color: var(--text-primary);
  word-break: break-all;
}
.app-card .pkg-icon {
  display: inline-block;
  width: 28px; height: 28px;
  background: var(--accent-dim);
  border-radius: var(--radius-sm);
  text-align: center;
  line-height: 28px;
  font-size: 0.8rem;
  color: var(--accent);
  margin-right: 8px;
  flex-shrink: 0;
}

/* ── WiFi List ──────────────────────────────────────────────── */
.wifi-list {
  list-style: none;
  padding: 12px 16px;
}
.wifi-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 4px;
  transition: border-color var(--transition);
}
.wifi-item:hover { border-color: var(--accent); }
.wifi-item .wifi-icon {
  font-size: 1.1rem;
  color: var(--accent);
  flex-shrink: 0;
}
.wifi-item .wifi-ssid {
  font-size: 0.88rem;
  font-weight: 500;
}

/* ── Empty / Error ──────────────────────────────────────────── */
.empty-state {
  padding: 40px 20px;
  text-align: center;
  color: var(--text-muted);
  font-size: 0.85rem;
}
.error-state {
  padding: 16px;
  margin: 12px 16px;
  background: rgba(248,81,73,0.1);
  border: 1px solid rgba(248,81,73,0.3);
  border-radius: var(--radius-sm);
  color: var(--danger);
  font-size: 0.82rem;
}
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 20px;
  font-size: 0.82rem;
  color: var(--text-primary);
  z-index: 999;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── Responsive ─────────────────────────────────────────────── */
@media (max-width: 820px) {
  :root { --sidebar-w: 220px; }
}
@media (max-width: 640px) {
  :root { --sidebar-w: 100%; --header-h: 50px; }
  .main-container { flex-direction: column; }
  .sidebar {
    width: 100%;
    min-width: unset;
    max-height: 40vh;
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn { padding: 8px 12px; font-size: 0.75rem; }
  .search-wrap { max-width: 100%; }
  .stats-row { margin-left: 0; width: 100%; }
  .apps-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
  table { font-size: 0.75rem; }
  table th, table td { padding: 5px 8px; }
  header h1 { font-size: 1rem; }
  .btn { padding: 5px 12px; font-size: 0.78rem; }
}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header>
  <h1>Android Forensic Tool</h1>
  <div class="header-actions">
    <button class="btn-icon" id="btn-refresh" title="Refresh devices" onclick="loadDevices()">&#x21bb;</button>
    <button class="btn btn-primary" id="btn-export" disabled onclick="exportJSON()">
      &#x2913; Export JSON
    </button>
  </div>
</header>

<!-- ═══ LAYOUT ═══ -->
<div class="main-container">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Devices</h2>
      <span class="count" id="device-count">0</span>
    </div>
    <div id="device-list">
      <div class="sidebar-loading"><span class="spinner"></span> Scanning...</div>
    </div>
  </aside>

  <!-- ── Main Content ── -->
  <main class="content">

    <!-- Placeholder when no device selected -->
    <div class="content-placeholder" id="placeholder">
      <div class="icon">&#x1f50d;</div>
      <p>Pilih device dari sidebar untuk memulai ekstraksi</p>
      <span class="hint">Pastikan USB debugging sudah diaktifkan</span>
    </div>

    <!-- Data views (hidden until device selected) -->
    <div id="data-views" class="data-views">

      <!-- Tab Bar -->
      <nav class="tab-bar" id="tab-bar">
        <button class="tab-btn active" data-tab="contacts" onclick="switchTab('contacts')">
          &#x1f4f1; Kontak <span class="tab-count" id="count-contacts">0</span>
        </button>
        <button class="tab-btn" data-tab="sms" onclick="switchTab('sms')">
          &#x2709; SMS <span class="tab-count" id="count-sms">0</span>
        </button>
        <button class="tab-btn" data-tab="call_logs" onclick="switchTab('call_logs')">
          &#x1f4de; Call Log <span class="tab-count" id="count-call_logs">0</span>
        </button>
        <button class="tab-btn" data-tab="apps" onclick="switchTab('apps')">
          &#x1f4e6; Apps <span class="tab-count" id="count-apps">0</span>
        </button>
        <button class="tab-btn" data-tab="wifi" onclick="switchTab('wifi')">
          &#x1f4f6; WiFi <span class="tab-count" id="count-wifi">0</span>
        </button>
      </nav>

      <!-- Toolbar: Search + Stats -->
      <div class="toolbar">
        <div class="search-wrap">
          <span class="search-icon">&#x1f50d;</span>
          <input type="text" id="search-input" placeholder="Filter data..." oninput="onSearchInput()">
        </div>
        <div class="stats-row" id="stats-row">
          <span class="stat-badge">Kontak: <strong id="stat-contacts">0</strong></span>
          <span class="stat-badge">SMS: <strong id="stat-sms">0</strong></span>
          <span class="stat-badge">Calls: <strong id="stat-calls">0</strong></span>
          <span class="stat-badge">Apps: <strong id="stat-apps">0</strong></span>
          <span class="stat-badge">WiFi: <strong id="stat-wifi">0</strong></span>
        </div>
      </div>

      <!-- Tab Panels -->
      <div class="tab-panels" id="tab-panels">
        <!-- Contacts -->
        <div class="tab-panel active" id="panel-contacts">
          <div class="table-wrap" id="contacts-content"></div>
        </div>
        <!-- SMS -->
        <div class="tab-panel" id="panel-sms">
          <div class="table-wrap" id="sms-content"></div>
        </div>
        <!-- Call Logs -->
        <div class="tab-panel" id="panel-call_logs">
          <div class="table-wrap" id="call_logs-content"></div>
        </div>
        <!-- Apps -->
        <div class="tab-panel" id="panel-apps">
          <div id="apps-content"></div>
        </div>
        <!-- WiFi -->
        <div class="tab-panel" id="panel-wifi">
          <div id="wifi-content"></div>
        </div>
      </div>

      <!-- Loading overlay -->
      <div id="loading-overlay" class="loading-overlay">
        <span class="spinner"></span> Mengekstrak data...
      </div>
    </div>

  </main>
</div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════════
   JAVASCRIPT
   ═══════════════════════════════════════════════════════════════ */

(function() {
  'use strict';

  // ── State ──
  let currentDevice = null;     // serial string
  let currentData = null;       // full extracted data object
  let currentTab = 'contacts';  // active tab name
  let searchTerm = '';
  let isExtracting = false;

  // ── DOM refs ──
  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => document.querySelectorAll(sel);

  const deviceList    = $('#device-list');
  const deviceCount   = $('#device-count');
  const placeholder   = $('#placeholder');
  const dataViews     = $('#data-views');
  const loadingOverlay= $('#loading-overlay');
  const btnExport     = $('#btn-export');
  const searchInput   = $('#search-input');
  const toast         = $('#toast');

  // ── Init ──
  document.addEventListener('DOMContentLoaded', () => {
    loadDevices();
    // Auto-refresh every 15s
    setInterval(loadDevices, 15000);
  });

  // ── Helpers ──
  function esc(str) {
    if (str === null || str === undefined) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function showToast(msg, duration) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._hide);
    toast._hide = setTimeout(() => toast.classList.remove('show'), duration || 3000);
  }

  function formatDate(ts) {
    if (!ts) return '-';
    const n = parseInt(ts, 10);
    if (isNaN(n)) return ts;
    // Content provider returns ms since epoch
    const d = new Date(n);
    if (isNaN(d.getTime())) return ts;
    const pad = (v) => String(v).padStart(2, '0');
    return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }

  function formatDuration(sec) {
    if (!sec) return '-';
    const n = parseInt(sec, 10);
    if (isNaN(n)) return sec;
    if (n === 0) return '0s';
    const h = Math.floor(n / 3600);
    const m = Math.floor((n % 3600) / 60);
    const s = n % 60;
    if (h > 0) return `${h}h ${m}m ${s}s`;
    if (m > 0) return `${m}m ${s}s`;
    return `${s}s`;
  }

  function smsTypeLabel(type) {
    const map = { '1': 'Inbox', '2': 'Sent', '3': 'Draft', '4': 'Outbox', '5': 'Failed', '6': 'Queued' };
    return map[type] || type || '-';
  }

  function smsTypeClass(type) {
    const map = { '1': 'badge-inbox', '2': 'badge-sent', '3': 'badge-draft', '4': 'badge-outbox' };
    return map[type] || '';
  }

  function callTypeLabel(type) {
    const map = { '1': 'Incoming', '2': 'Outgoing', '3': 'Missed', '5': 'Voicemail', '6': 'Rejected', '7': 'Blocked' };
    return map[type] || type || '-';
  }

  function callTypeClass(type) {
    const map = { '1': 'badge-incoming', '2': 'badge-outgoing', '3': 'badge-missed', '5': 'badge-voicemail', '6': 'badge-rejected' };
    return map[type] || '';
  }

  // ── Load Devices ──
  window.loadDevices = async function() {
    deviceList.innerHTML = '<div class="sidebar-loading"><span class="spinner"></span> Scanning...</div>';
    try {
      const res = await fetch('/api/devices');
      const json = await res.json();
      if (json.error) throw new Error(json.error);
      renderDeviceList(json.devices || []);
    } catch (err) {
      deviceList.innerHTML = `<div class="sidebar-empty">Gagal memuat devices<br><small>${esc(err.message)}</small></div>`;
    }
  };

  function renderDeviceList(devices) {
    deviceCount.textContent = devices.length;
    if (devices.length === 0) {
      deviceList.innerHTML = '<div class="sidebar-empty">Tidak ada device terdeteksi.<br><small>Hubungkan device dengan USB debugging</small></div>';
      return;
    }
    const frag = document.createDocumentFragment();
    devices.forEach(d => {
      const card = document.createElement('div');
      card.className = 'device-card' + (currentDevice === d.serial ? ' active' : '');
      card.dataset.serial = d.serial;
      card.innerHTML = `
        <div class="device-model">${esc(d.model || 'Unknown')}</div>
        <div class="device-serial">${esc(d.serial)}</div>
        <span class="device-status ${esc(d.status)}">${esc(d.status)}</span>
      `;
      card.addEventListener('click', () => selectDevice(d.serial));
      frag.appendChild(card);
    });
    deviceList.innerHTML = '';
    deviceList.appendChild(frag);
  }

  // ── Select Device ──
  window.selectDevice = async function(serial) {
    if (isExtracting) return;
    if (!serial) return;

    // Update UI
    currentDevice = serial;
    currentData = null;
    currentTab = 'contacts';

    // Highlight card
    $$('.device-card').forEach(c => c.classList.toggle('active', c.dataset.serial === serial));

    // Show data views
    placeholder.style.display = 'none';
    dataViews.style.display = 'flex';
    loadingOverlay.classList.add('show');
    btnExport.disabled = true;

    // Reset search
    searchTerm = '';
    searchInput.value = '';

    // Reset counts
    $$('.tab-count').forEach(el => el.textContent = '0');

    // Set tab to contacts
    switchTab('contacts');

    try {
      const res = await fetch(`/api/extract/${encodeURIComponent(serial)}`, { method: 'POST' });
      const json = await res.json();
      if (json.error) throw new Error(json.error);

      currentData = json;
      renderAll(json);
      btnExport.disabled = false;
      showToast(`Ekstraksi selesai: ${json.contacts.length} kontak, ${json.sms.length} SMS, ${json.call_logs.length} panggilan, ${json.apps.length} aplikasi`, 2500);
    } catch (err) {
      showError(`Gagal ekstrak: ${err.message}`);
      showToast('Ekstraksi gagal: ' + err.message, 4000);
    } finally {
      loadingOverlay.classList.remove('show');
    }
  };

  // ── Render All Tabs ──
  function renderAll(data) {
    renderContacts(data.contacts);
    renderSMS(data.sms);
    renderCallLogs(data.call_logs);
    renderApps(data.apps);
    renderWifi(data.wifi);

    // Update counts
    $('#count-contacts').textContent = data.contacts.length;
    $('#count-sms').textContent = data.sms.length;
    $('#count-call_logs').textContent = data.call_logs.length;
    $('#count-apps').textContent = data.apps.length;
    $('#count-wifi').textContent = data.wifi.length;

    // Update stats
    $('#stat-contacts').textContent = data.contacts.length;
    $('#stat-sms').textContent = data.sms.length;
    $('#stat-calls').textContent = data.call_logs.length;
    $('#stat-apps').textContent = data.apps.length;
    $('#stat-wifi').textContent = data.wifi.length;
  }

  // ── Tab Switching ──
  window.switchTab = function(tab) {
    currentTab = tab;
    $$('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    $$('.tab-panel').forEach(p => p.classList.remove('active'));
    const panel = document.getElementById('panel-' + tab);
    if (panel) panel.classList.add('active');

    // Apply current search to new tab
    filterCurrentTab();
  };

  // ── Search ──
  let searchTimeout = null;
  window.onSearchInput = function() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      searchTerm = searchInput.value.trim().toLowerCase();
      filterCurrentTab();
    }, 250);
  };

  function filterCurrentTab() {
    if (!currentData) return;
    switch (currentTab) {
      case 'contacts': renderContacts(currentData.contacts, true); break;
      case 'sms':      renderSMS(currentData.sms, true); break;
      case 'call_logs':renderCallLogs(currentData.call_logs, true); break;
      case 'apps':     renderApps(currentData.apps, true); break;
      case 'wifi':     renderWifi(currentData.wifi, true); break;
    }
  }

  function matchesSearch(text, term) {
    if (!term) return true;
    return String(text).toLowerCase().indexOf(term) !== -1;
  }

  // ── Render Contacts ──
  function renderContacts(contacts, filtered) {
    const container = $('#contacts-content');
    const term = filtered ? searchTerm : '';
    const data = term ? contacts.filter(c => matchesSearch(c.name, term) || matchesSearch(c.phone, term)) : contacts;

    if (!data.length) {
      container.innerHTML = '<div class="empty-state">' + (term ? 'Tidak ada kontak yang cocok dengan filter' : 'Tidak ada data kontak') + '</div>';
      return;
    }

    let html = '<table><thead><tr><th>Name</th><th>Phone</th></tr></thead><tbody>';
    data.forEach(c => {
      html += `<tr><td>${esc(c.name)}</td><td>${esc(c.phone)}</td></tr>`;
    });
    html += '</tbody></table>';
    container.innerHTML = html;
  }

  // ── Render SMS ──
  function renderSMS(smsList, filtered) {
    const container = $('#sms-content');
    const term = filtered ? searchTerm : '';
    const data = term ? smsList.filter(s =>
      matchesSearch(s.address, term) || matchesSearch(s.body, term) || matchesSearch(smsTypeLabel(s.type), term)
    ) : smsList;

    if (!data.length) {
      container.innerHTML = '<div class="empty-state">' + (term ? 'Tidak ada SMS yang cocok dengan filter' : 'Tidak ada data SMS') + '</div>';
      return;
    }

    let html = '<table><thead><tr><th>From/To</th><th>Message</th><th>Date</th><th>Type</th></tr></thead><tbody>';
    data.forEach(s => {
      const typeCls = smsTypeClass(s.type);
      html += `<tr>
        <td>${esc(s.address)}</td>
        <td class="sms-body">${esc(s.body)}</td>
        <td>${formatDate(s.date)}</td>
        <td><span class="badge-type ${typeCls}">${esc(smsTypeLabel(s.type))}</span></td>
      </tr>`;
    });
    html += '</tbody></table>';
    container.innerHTML = html;
  }

  // ── Render Call Logs ──
  function renderCallLogs(calls, filtered) {
    const container = $('#call_logs-content');
    const term = filtered ? searchTerm : '';
    const data = term ? calls.filter(c =>
      matchesSearch(c.number, term) || matchesSearch(callTypeLabel(c.type), term)
    ) : calls;

    if (!data.length) {
      container.innerHTML = '<div class="empty-state">' + (term ? 'Tidak ada panggilan yang cocok dengan filter' : 'Tidak ada data call log') + '</div>';
      return;
    }

    let html = '<table><thead><tr><th>Number</th><th>Date</th><th>Duration</th><th>Type</th></tr></thead><tbody>';
    data.forEach(c => {
      const typeCls = callTypeClass(c.type);
      html += `<tr>
        <td>${esc(c.number)}</td>
        <td>${formatDate(c.date)}</td>
        <td>${formatDuration(c.duration)}</td>
        <td><span class="badge-type ${typeCls}">${esc(callTypeLabel(c.type))}</span></td>
      </tr>`;
    });
    html += '</tbody></table>';
    container.innerHTML = html;
  }

  // ── Render Apps ──
  function renderApps(apps, filtered) {
    const container = $('#apps-content');
    const term = filtered ? searchTerm : '';
    const data = term ? apps.filter(a => matchesSearch(a, term)) : apps;

    if (!data.length) {
      container.innerHTML = '<div class="empty-state">' + (term ? 'Tidak ada aplikasi yang cocok dengan filter' : 'Tidak ada data aplikasi') + '</div>';
      return;
    }

    let html = '<div class="apps-grid">';
    data.forEach(pkg => {
      // Simple icon: first letter
      const letter = pkg.charAt(0).toUpperCase();
      html += `<div class="app-card">
        <div style="display:flex;align-items:center;">
          <span class="pkg-icon">${esc(letter)}</span>
          <span class="pkg-name">${esc(pkg)}</span>
        </div>
      </div>`;
    });
    html += '</div>';
    container.innerHTML = html;
  }

  // ── Render WiFi ──
  function renderWifi(ssids, filtered) {
    const container = $('#wifi-content');
    const term = filtered ? searchTerm : '';
    const data = term ? ssids.filter(s => matchesSearch(s, term)) : ssids;

    if (!data.length) {
      container.innerHTML = '<div class="empty-state">' + (term ? 'Tidak ada WiFi yang cocok dengan filter' : 'Tidak ada data WiFi') + '</div>';
      return;
    }

    let html = '<ul class="wifi-list">';
    data.forEach(ssid => {
      html += `<li class="wifi-item">
        <span class="wifi-icon">&#x1f4f6;</span>
        <span class="wifi-ssid">${esc(ssid)}</span>
      </li>`;
    });
    html += '</ul>';
    container.innerHTML = html;
  }

  // ── Error Display ──
  function showError(msg) {
    // Show error in current panel if visible
    const activePanel = document.querySelector('.tab-panel.active');
    if (activePanel) {
      activePanel.innerHTML = `<div class="error-state">${esc(msg)}</div>`;
    }
  }

  // ── Export ──
  window.exportJSON = function() {
    if (!currentDevice) {
      showToast('Pilih device terlebih dahulu', 2000);
      return;
    }
    window.open(`/api/export/${encodeURIComponent(currentDevice)}`, '_blank');
    showToast('Mengunduh file evidence...', 2000);
  };

})();
</script>
</body>
</html>
