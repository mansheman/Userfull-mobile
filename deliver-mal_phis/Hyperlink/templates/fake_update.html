<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Update</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .update-card {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 20px;
            padding: 48px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .update-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #0f3460, #533483);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 48px;
        }
        .update-card h1 {
            font-size: 24px;
            margin-bottom: 12px;
        }
        .update-card p {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 8px;
            line-height: 1.6;
        }
        .progress-container {
            width: 100%;
            height: 8px;
            background: #0f3460;
            border-radius: 4px;
            margin: 24px 0;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #533483);
            border-radius: 4px;
            width: 0%;
            animation: progress 3s ease-in-out forwards;
        }
        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        .btn-download {
            display: inline-block;
            padding: 16px 48px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
            margin-top: 16px;
        }
        .btn-download:hover {
            background: #c73650;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(233,69,96,0.3);
        }
        .version-info {
            margin-top: 24px;
            font-size: 12px;
            color: #555;
        }
        .footer-note {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #555;
            font-size: 11px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="update-card">
        <div class="update-icon">🔄</div>
        <h1>System Update Available</h1>
        <p>A critical security update is required to continue browsing.</p>
        <p>Version 142.0.7251.109 — Critical Security Patch</p>

        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        <a href="{{ download_url }}" class="btn-download" id="downloadBtn">
            Download & Install Update
        </a>

        <div class="version-info">
            <p>Released: July 18, 2026</p>
            <p>Size: 108.2 MB</p>
        </div>
    </div>

    <div class="footer-note">
        ⚠️ Lab Simulation — Fake System Update (Drive-by Download Technique)
    </div>

    <script>
        // Auto-start download after progress bar completes
        setTimeout(() => {
            console.log('[*] Fake update: auto-triggering download');
            // Uncomment to enable auto-download:
            // window.location.href = '{{ download_url }}';
        }, 3500);

        document.getElementById('downloadBtn').addEventListener('click', function() {
            console.log('[*] Fake update: download button clicked');
        });
    </script>
</body>
</html>
